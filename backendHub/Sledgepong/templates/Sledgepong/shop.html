{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'Sledgepong/css/shop.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
    <title>The Shop</title>
</head>
<body>
    <div class="lobby">
        <h1 class="main-title">The Shop</h1>
        <div class="currency">
            <img src="{% static 'Sledgepong/Images/coinimage.png' %}" alt="Coin Icon" class="coin-icon">
            <span id="coinCount">0</span>
        </div>
        <div class="item-container">
            {% for texture in textures %}
                <div class="item" id="item-{{ texture.id }}">
                    <div> {{ texture.name }} </div>
                    <img src="{{ texture.texture_img.url }}" alt="Star Icon" class="item-icon">
                    <div class="item-price">10 Coins</div>
                </div>
            {% endfor %}
        </div>
        <button class="nav-button" id="backButton">Back</button>
    </div>
    
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const backButton = document.getElementById('backButton');

    backButton.addEventListener('click', function() {
        // Option A: Go back to previous page
        window.history.back();

         //Option B: Go to specific URL (recommended)
         window.location.href = "{% url 'Sledgepong' %}";  // Replace with your actual URL name

        // Option C: Go to hub
        // window.location.href = "{% url 'hub_view' %}";
    });
});
</script>
</body>
</html>
