{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'Sledgepong/css/shop.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
    <title>The Shop</title>
</head>
<body>
    <div class="lobby">
        <h1 class="main-title">The Shop</h1>
        <div class="currency">
            <img src="{% static 'Sledgepong/Images/coinimage.png' %}" alt="Coin Icon" class="coin-icon">
            <span id="coinCount">{{ coins }}</span>
        </div>
        <div class="item-container">
            <div class="current_item" id="item-{{ current_texture.id }}" data-texture-id="{{ current_texture.id }}">
                <div>{{ current_texture.name }}</div>
                <img src="{{ current_texture.texture_img.url }}" alt="Texture Icon" class="item-icon">
                <div class="item-price">Equipped</div>
            </div>
            {% for texture in collected_textures %}
                <div class="collected_items" id="item-{{ texture.id }}" data-texture-id="{{ texture.id }}">
                    <div>{{ texture.name }}</div>
                    <img src="{{ texture.texture_img.url }}" alt="Texture Icon" class="item-icon">
                    <div class="item-price">Owned</div>
                </div>
            {% endfor %}
            {% for texture in non_collected_textures %}
                <div class="non_collected_items" data-texture-id="{{ texture.id }}">
                    <div>{{ texture.name }}</div>
                    <img src="{{ texture.texture_img.url }}" alt="Texture Icon" class="item-icon">
                    <div class="item-price">10 Coins</div>
                </div>
            {% endfor %}
        </div>
        <button class="nav-button" id="backButton">Back</button>
    </div>
    <script src="{% static 'Sledgepong/js/shop.js' %}"></script>
</body>
</html>
