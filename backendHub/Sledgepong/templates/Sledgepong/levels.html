{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sledgepong Levels</title>
    <link rel="stylesheet" href="{% static 'Sledgepong/css/levels.css' %}">
</head>
<body>
    <a id="backButton" class="back-button" href="{% url 'playpage' %}">Back</a>
    <h1 class="title">Select a Level</h1>

    <div class="levels-container">
        <div class="section">
            <h2>Original Levels</h2>
            <div id="originalLevels" class="level-list">
                <!-- Original levels will appear here -->
            </div>
        </div>
        <div class="section">
            <h2>Saved Levels</h2>
            <div id="savedLevels" class="level-list">
                <!-- Saved levels will appear here -->
            </div>
        </div>
    </div>

    <script src="{% static 'Sledgepong/js/levels.js' %}"></script>
</body>
</html>
