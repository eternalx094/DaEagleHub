{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - {{ user.username }}</title>
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7893421641535094"
            crossorigin="anonymous"></script>
</head>
<body style="background-image: url('{% static 'Images/DaHub/galaxy.jpg' %}'); background-repeat: no-repeat;">
    <div class="hub-button-container">
        <a href="{% url 'hub_view' %}" class="hub-button">To Hub</a>
    </div>
    <div class="profile-container">
        <div class="profile-header">
            <img src="{% static 'Images/DaHub/profilepic.png' %}" alt="Profile Picture" class="profile-pic">
            <h1 class="profile-username">{{ user.username }}</h1>
            <a href="{% url 'logout' %}" class="logout-button">Logout</a>
        </div>
        <div class="profile-details">
            <h2>About Me</h2>
            <p>This is your profile page. You can add more information here.</p>
            <h2>Account Details</h2>
            <ul>
                <li>Email: {{ user.email }}</li>
                <li>Date joined: {{ user.date_joined|date:"F j, Y" }}</li>
            </ul>
        </div>
    </div>
</body>
</html>
