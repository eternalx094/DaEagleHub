{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Sent - DaEagleHub</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
</head>
<body style="background-image: url('{% static 'Images/DaHub/galaxy.jpg' %}'); background-repeat: no-repeat;">
    <div class="login-container">
        <div class="login-header">
            <img src="{% static 'logo/logo.png' %}" alt="DaHub Logo" class="login-logo">
            <h1 class="login-title">Check Your Email</h1>
        </div>
        <div class="login-form">
            <p style="opacity: 0.85; text-align: center;">
                If an account exists for that email, a reset link has been sent.
            </p>
            <div class="login-footer">
                <p><a href="{% url 'user_login' %}">Back to login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
