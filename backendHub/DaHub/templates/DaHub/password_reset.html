{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset - DaEagleHub</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
</head>
<body style="background-image: url('{% static 'Images/DaHub/galaxy.jpg' %}'); background-repeat: no-repeat;">
    <div class="login-container">
        <div class="login-header">
            <img src="{% static 'logo/logo.png' %}" alt="DaHub Logo" class="login-logo">
            <h1 class="login-title">Reset Password</h1>
        </div>

        <form method="post" class="login-form">
            {% csrf_token %}
            <p style="opacity: 0.85; text-align: center; margin-bottom: 16px;">
                Enter your account email and we will send a reset link.
            </p>
            <div class="form-group">
                <label for="id_email">Email</label>
                <input type="email" name="email" id="id_email" required autofocus>
                {% if form.email.errors %}
                    <div class="field-error">
                        {% for error in form.email.errors %}
                            {{ error }}
                        {% endfor %}
                    </div>
                {% endif %}
            </div>

            <button type="submit" class="login-button">Send Reset Link</button>

            <div class="login-footer">
                <p><a href="{% url 'user_login' %}">Back to login</a></p>
            </div>
        </form>
    </div>
</body>
</html>
