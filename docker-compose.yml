services:
  nginx:
    image: nginx:alpine
    volumes:
      - type: bind
        source: ./backendHub/static
        target: /static
        read_only: true
      - type: bind
        source: ./backendHub/media
        target: /media
        read_only: true
    depends_on:
      - backend

  backend:
    build: ./backendHub
    expose:
      - "8000"
    volumes:
      - type: bind
        source: ./backendHub
        target: /app
    command: ./entrypoint.sh
