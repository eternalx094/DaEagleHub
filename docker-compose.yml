services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backendHub/static:/static:ro
      - ./backendHub/media:/media:ro
    depends_on:
      - backend

  backend:
    build: ./backendHub
    container_name: backend
    expose:
      - "8000"
    volumes:
      - ./backendHub:/app
    command: ./entrypoint.sh